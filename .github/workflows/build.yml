name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Decode or Generate Keystore
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          HEADUNIT_KEYSTORE_BASE64: ${{ secrets.HEADUNIT_KEYSTORE_BASE64 }}
          SEC_KEYSTORE_PASS: ${{ secrets.HEADUNIT_KEYSTORE_PASSWORD }}
          SEC_KEY_PASS: ${{ secrets.HEADUNIT_KEY_PASSWORD }}
        run: |
          if [ -n "$HEADUNIT_KEYSTORE_BASE64" ]; then
            echo "Decoding provided keystore..."
            echo "$HEADUNIT_KEYSTORE_BASE64" | base64 --decode > headunit-release-key.jks
            echo "HEADUNIT_KEYSTORE_PASSWORD=$SEC_KEYSTORE_PASS" >> $GITHUB_ENV
            echo "HEADUNIT_KEY_PASSWORD=$SEC_KEY_PASS" >> $GITHUB_ENV
          else
            echo "Warning: HEADUNIT_KEYSTORE_BASE64 secret is not set. Generating a temporary key for the release build..."
            keytool -genkey -v -keystore headunit-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias headunit-revived -dname "CN=Temporary, OU=Dev, O=Dummy, L=City, S=State, C=US" -storepass "headunit123" -keypass "headunit123"
            echo "HEADUNIT_KEYSTORE_PASSWORD=headunit123" >> $GITHUB_ENV
            echo "HEADUNIT_KEY_PASSWORD=headunit123" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
